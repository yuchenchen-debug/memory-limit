.tile:active{transform:scale(.93)}
.tile.show{background:#a855f7;box-shadow:0 0 25px #a855f788,0 0 60px #a855f733;border-color:#a855f7}

.tile.correct{background:#00ff88;box-shadow:0 0 25px #00ff8888;border-color:#00ff88}

let curLang = 'zh-TW';

function detectLang() {
  const saved = localStorage.getItem('ml-lang');
  if (saved && LANG[saved]) return saved;
  const nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (nav.startsWith('zh-tw') || nav === 'zh-hant' || nav.startsWith('zh-hk')) return 'zh-TW';
  if (nav.startsWith('zh')) return 'zh-TW';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('es')) return 'es';
  if (nav.startsWith('pt')) return 'pt';
  if (nav.startsWith('de')) return 'de';
  if (nav.startsWith('fr')) return 'fr';
  if (nav.startsWith('th')) return 'th';
  if (nav.startsWith('id') || nav.startsWith('ms')) return 'id';
  if (nav.startsWith('vi')) return 'vi';
  if (nav.startsWith('en')) return 'en';
  return 'zh-TW';
}

function t(key) {
  return LANG[curLang][key] || LANG['zh-TW'][key] || key;
}

function changeLang(lang) {
  if (!LANG[lang]) return;
  curLang = lang;
  localStorage.setItem('ml-lang', lang);
  document.getElementById('langSelect').value = lang;
  applyLang();
}

function applyLang() {
  const L = LANG[curLang];
  // Update HTML lang attribute
  const langMap = {'zh-TW':'zh-Hant','en':'en','ja':'ja','ko':'ko','es':'es','pt':'pt','de':'de','fr':'fr','th':'th','id':'id','vi':'vi'};
  document.documentElement.lang = langMap[curLang] || curLang;

  // Meta tags
  document.title = L.metaTitle;
  document.querySelector('meta[name="description"]').content = L.metaDesc;
  document.querySelector('meta[property="og:title"]').content = L.ogTitle;
  document.querySelector('meta[property="og:description"]').content = L.ogDesc;
  document.querySelector('meta[name="twitter:title"]').content = L.twitterTitle;
  document.querySelector('meta[name="twitter:description"]').content = L.twitterDesc;

  // All data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (L[key]) el.textContent = L[key];
  });

  // Placeholder
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (L[key]) el.placeholder = L[key];
  });

  // More games section
  const moreTitle = document.getElementById('moreGamesTitle');
  if (moreTitle) moreTitle.textContent = L.moreGames;
  const gameNames = document.querySelectorAll('.game-card .name');
  const gameHooks = document.querySelectorAll('.game-card .hook');
  if (gameNames[0]) gameNames[0].textContent = L.gameMs;
  if (gameNames[1]) gameNames[1].textContent = L.gameColor;
  if (gameNames[2]) gameNames[2].textContent = L.gameReaction;
  if (gameHooks[0]) gameHooks[0].textContent = L.gameMsHook;
  if (gameHooks[1]) gameHooks[1].textContent = L.gameColorHook;
  if (gameHooks[2]) gameHooks[2].textContent = L.gameReactionHook;
}

// ---- State ----
let sequence = [];
let playerIndex = 0;
let level = 2;
let score = 0;
let gameActive = false;
let showingSequence = false;
let roundStartTime = 0;
let tapTimes = [];
let personalBest = parseInt(localStorage.getItem('ml-pb') || '0');

// ---- Screen management ----
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'resultScreen') {
    document.getElementById('resultScreen').scrollTop = 0;
    document.body.style.overflow = 'hidden';
  } else {
    document.body.style.overflow = 'hidden';
  }
}

// ---- Grid setup ----
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 16; i++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.index = i;
    tile.addEventListener('click', () => handleTap(i));
    tile.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(i); }, { passive: false });
    grid.appendChild(tile);
  }
}

// ---- Taunts ----
function getTaunt(lv) {
  const L = LANG[curLang];
  const taunts = L.taunts;
  let pool;
  if (lv >= 25) pool = taunts[25];
  else if (lv >= 20) pool = taunts[20];
  else if (lv >= 15) pool = taunts[15];
  else if (lv >= 11) pool = taunts[11];
  else if (lv >= 8) pool = taunts[8];
  else if (lv >= 5) pool = taunts[5];
  else pool = taunts[2];
  return pool[Math.floor(Math.random() * pool.length)];
}

// ---- Ranking ----
function getRank(lv) {
  const L = LANG[curLang];
  const r = L.ranks;
  if (lv >= 25) return { rank: 'SSS', cls: 'sss', pct: r.sss };
  if (lv >= 20) return { rank: 'SS', cls: 'ss', pct: r.ss };
  if (lv >= 15) return { rank: 'S', cls: 's', pct: r.s };
  if (lv >= 11) return { rank: 'A', cls: 'a', pct: r.a };
  if (lv >= 8) return { rank: 'B', cls: 'b', pct: r.b };
  if (lv >= 5) return { rank: 'C', cls: 'c', pct: r.c };
  if (lv >= 3) return { rank: 'D', cls: 'd', pct: r.d };
  return { rank: 'F', cls: 'f', pct: r.f };
}

// ---- Age comparison ----
function getAge(lv) {
  const L = LANG[curLang];
  const a = L.ages;
  if (lv >= 25) return a[25];
  if (lv >= 20) return a[20];
  if (lv >= 15) return a[15];
  if (lv >= 11) return a[11];
  if (lv >= 8) return a[8];
  if (lv >= 5) return a[5];
  if (lv >= 3) return a[3];
  return a[0];
}

// ---- Milestones ----
const milestones = [5, 8, 11, 15, 20, 25, 31];
function getMilestoneProgress(lv) {
  let prev = 2, next = 5;
  for (const m of milestones) {
    if (lv < m) { next = m; break; }
    prev = m;
    next = milestones[milestones.indexOf(m) + 1] || m + 6;
  }
  return Math.min(100, ((lv - prev) / (next - prev)) * 100);
}

// ---- Game logic ----
function startGame() {
  level = 2;
  score = 0;
  sequence = [];
  showScreen('gameScreen');
  buildGrid();
  updateHUD();
  setTimeout(() => nextRound(), 600);
}

function updateHUD() {
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('taunt').textContent = getTaunt(level);
  document.getElementById('progressFill').style.width = getMilestoneProgress(level) + '%';
}

function nextRound() {
  playerIndex = 0;
  tapTimes = [];
  gameActive = false;
  showingSequence = true;
  document.getElementById('status').textContent = t('watching');

  // Generate new sequence
  sequence = [];
  for (let i = 0; i < level; i++) {
    let next;
    do { next = Math.floor(Math.random() * 16); } while (sequence.length > 0 && next === sequence[sequence.length - 1]);
    sequence.push(next);
  }

  // Show sequence
  const tiles = document.querySelectorAll('.tile');
  let delay = 400;
  sequence.forEach((idx, i) => {
    setTimeout(() => {
      tiles[idx].classList.add('show');
      tiles[idx].classList.add('pulse');
    }, delay + i * 500);
    setTimeout(() => {
      tiles[idx].classList.remove('show');
      tiles[idx].classList.remove('pulse');
    }, delay + i * 500 + 300);
  });

  setTimeout(() => {
    showingSequence = false;
    gameActive = true;
    roundStartTime = performance.now();
    document.getElementById('status').textContent = `${t('yourTurn')} (0/${level})`;
  }, delay + sequence.length * 500 + 200);
}

function handleTap(idx) {
  if (!gameActive || showingSequence) return;

  const tiles = document.querySelectorAll('.tile');
  const tile = tiles[idx];

  if (idx === sequence[playerIndex]) {
    // Correct
    tapTimes.push(performance.now());
    tile.classList.add('correct', 'pulse');
    setTimeout(() => tile.classList.remove('correct', 'pulse'), 250);

    playerIndex++;
    document.getElementById('status').textContent = `${t('correct')} (${playerIndex}/${level})`;

    if (playerIndex === sequence.length) {
      // Round complete
      gameActive = false;
      const elapsed = performance.now() - roundStartTime;
      const avgTap = elapsed / level;
      const speedBonus = Math.max(0, Math.floor((2000 - avgTap) / 10));
      score += level * 10 + speedBonus;
      level++;
      updateHUD();
      document.getElementById('status').textContent = speedBonus > 0 ? t('speedBonus').replace('__', speedBonus) : t('perfect');
      setTimeout(() => nextRound(), 800);
    }
  } else {
    // Wrong
    gameActive = false;
    tile.classList.add('wrong', 'shake');
    // Show correct tile
    setTimeout(() => {
      tiles[sequence[playerIndex]].classList.add('show');
    }, 300);
    setTimeout(() => {
      tile.classList.remove('wrong', 'shake');
      tiles[sequence[playerIndex]].classList.remove('show');
      endGame();
    }, 1200);
  }
}

function endGame() {
  const finalLevel = level - 1; // last completed
  const isNewPB = finalLevel > personalBest;
  if (isNewPB) {
    personalBest = finalLevel;
    localStorage.setItem('ml-pb', personalBest);
  }

  const r = getRank(finalLevel);

  document.getElementById('resultRank').textContent = r.rank;
  document.getElementById('resultRank').className = 'result-rank ' + r.cls;
  document.getElementById('resultLevel').textContent = finalLevel;
  document.getElementById('resultMsg').textContent = getTaunt(finalLevel);
  document.getElementById('resultPercentile').textContent = r.pct;
  document.getElementById('resultAge').innerHTML = `${t('agePrefix')} <em>${getAge(finalLevel)}</em>`;

  document.getElementById('pbBadge').style.display = isNewPB ? 'block' : 'none';

  document.getElementById('resultDetail').innerHTML = `
    <strong>${t('detailSeqLen')}</strong> ${finalLevel}<br>
    <strong>${t('detailScore')}</strong> ${score}<br>
    <strong>${t('detailRank')}</strong> ${r.rank} (${r.pct})<br>
    <strong>${t('detailPB')}</strong> Level ${personalBest}
  `;

  // Restore name if saved
  const savedName = localStorage.getItem('ml-name') || '';
  document.getElementById('playerName').value = savedName;

  showScreen('resultScreen');

  // Track with GA
  if (typeof gtag === 'function') {
    gtag('event', 'game_over', { level: finalLevel, score: score, rank: r.rank });
  }
}

// ---- Score submission ----
function submitScore() {
  const name = document.getElementById('playerName').value.trim() || t('anonName');
  localStorage.setItem('ml-name', name);
  const finalLevel = parseInt(document.getElementById('resultLevel').textContent);
  scoresRef.push({
    name: name,
    level: finalLevel,
    score: score,
    rank: getRank(finalLevel).rank,
    ts: Date.now()
  }).then(() => {
    document.getElementById('nameInput').innerHTML = `<div style="color:#00ff88;font-size:.85rem">${t('uploaded')}</div>`;
  }).catch(() => {
    document.getElementById('nameInput').innerHTML = `<div style="color:#ff2d55;font-size:.85rem">${t('uploadFail')}</div>`;
  });
}

// ---- Leaderboard ----
function showLeaderboard() {
  document.getElementById('lbModal').classList.add('active');
  document.getElementById('lbList').innerHTML = `<div style="text-align:center;color:#888;padding:20px">${t('lbLoading')}</div>`;
  scoresRef.orderByChild('level').limitToLast(20).once('value').then(snap => {
    const entries = [];
    snap.forEach(c => entries.push(c.val()));
    entries.sort((a, b) => b.level - a.level || b.score - a.score);
    if (entries.length === 0) {
      document.getElementById('lbList').innerHTML = `<div style="text-align:center;color:#888;padding:20px">${t('lbEmpty')}</div>`;
      return;
    }
    document.getElementById('lbList').innerHTML = entries.map((e, i) => `
      <div class="lb-row">
        <span class="lb-rank">${i + 1}</span>
        <span class="lb-name">${escHTML(e.name)}</span>
        <span class="lb-score">Lv.${e.level} (${e.rank})</span>
      </div>
    `).join('');
  }).catch(() => {
    document.getElementById('lbList').innerHTML = `<div style="text-align:center;color:#888;padding:20px">${t('lbFail')}</div>`;
  });
}
function closeLB() { document.getElementById('lbModal').classList.remove('active'); }

function generateShareImage() {
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Decorative grid
  ctx.strokeStyle = '#1e1e32';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    for (let j = 0; j < 5; j++) {
      const x = 140 + i * 160, y = 500 + j * 80;
      ctx.strokeRect(x, y, 140, 60);
    }
  }

  // Title
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 64px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(t('shareImgTitle'), W / 2, 140);

  ctx.fillStyle = '#666';
  ctx.font = '32px -apple-system, sans-serif';
  ctx.fillText(t('shareImgSub'), W / 2, 200);

  // Level
  const lv = document.getElementById('resultLevel').textContent;
  const r = getRank(parseInt(lv));

  ctx.fillStyle = '#e0e0e0';
  ctx.font = 'bold 48px -apple-system, sans-serif';
  ctx.fillText(t('shareImgMyMemory'), W / 2, 340);

  // Rank
  const rankColors = { sss: '#ffd700', ss: '#ff6b6b', s: '#ffd700', a: '#a855f7', b: '#6366f1', c: '#3b82f6', d: '#888', f: '#ff2d55' };
  ctx.fillStyle = rankColors[r.cls] || '#a855f7';
  ctx.font = 'bold 180px -apple-system, sans-serif';
  ctx.fillText(r.rank, W / 2, 560);

  ctx.fillStyle = '#e0e0e0';
  ctx.font = 'bold 60px -apple-system, sans-serif';
  ctx.fillText(`Level ${lv}`, W / 2, 650);

  ctx.fillStyle = '#888';
  ctx.font = '36px -apple-system, sans-serif';
  ctx.fillText(r.pct, W / 2, 720);

  // Age
  ctx.fillStyle = '#aaa';
  ctx.font = '30px -apple-system, sans-serif';
  ctx.fillText(t('shareImgAge').replace('__', getAge(parseInt(lv))), W / 2, 800);

  // CTA
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 34px -apple-system, sans-serif';
  ctx.fillText(t('shareImgCTA'), W / 2, 920);

  ctx.fillStyle = '#666';
  ctx.font = '26px -apple-system, sans-serif';
  ctx.fillText('yuchenchen-debug.github.io/memory-limit', W / 2, 980);

  return canvas;
}

function shareIG() {
  const canvas = generateShareImage();
  canvas.toBlob(blob => {
    if (navigator.share) {
      const file = new File([blob], 'memory-limit.png', { type: 'image/png' });
      navigator.share({ files: [file] }).catch(() => {});
    } else {
      shareDL();
    }
  });
}

function shareDL() {
  const canvas = generateShareImage();
  const link = document.createElement('a');
  link.download = 'memory-limit-result.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
