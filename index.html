<script>
// ---- Firebase ----
firebase.initializeApp({
  apiKey:"AIzaSyC977FBxgGqVCrEjYc_J5JlefMWNCgffg0",
  authDomain:"yuchenchen-60a08.firebaseapp.com",
  databaseURL:"https://yuchenchen-60a08-default-rtdb.firebaseio.com",
  projectId:"yuchenchen-60a08"
});
const db = firebase.database();
const scoresRef = db.ref('memory-scores');

// ---- State ----
let sequence = [];
let playerIndex = 0;
let level = 2;
let score = 0;
let gameActive = false;
let showingSequence = false;
let roundStartTime = 0;
let tapTimes = [];
let personalBest = parseInt(localStorage.getItem('ml-pb') || '0');

// ---- Fake stats counter ----
const baseFake = 1923847;
const daysSinceBase = Math.floor((Date.now() - new Date('2025-06-01').getTime()) / 86400000);
document.getElementById('fakeTotal').textContent = (baseFake + daysSinceBase * 312 + Math.floor(Math.random()*200)).toLocaleString();

// ---- Screen management ----
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'resultScreen') {
    document.getElementById('resultScreen').scrollTop = 0;
    document.body.style.overflow = 'hidden';
  } else {
    document.body.style.overflow = 'hidden';
  }
}

// ---- Grid setup ----
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 16; i++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.index = i;
    tile.addEventListener('click', () => handleTap(i));
    tile.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(i); }, { passive: false });
    grid.appendChild(tile);
  }
}

// ---- Taunts ----
const taunts = {
  2: ["連金魚都記得住", "這是幼稚園等級"],
  5: ["普通人類記憶力", "心理學教科書說 7±2 是極限"],
  8: ["不錯，超越平均", "你的海馬迴還行"],
  11: ["記憶宮殿使用者？", "你的工作記憶超標"],
  15: ["超人級記憶", "你是不是用了什麼技巧"],
  20: ["這不科學", "你的大腦不是正常人類的"],
  25: ["已通報腦神經研究中心", "請捐獻大腦供科學研究"]
};

function getTaunt(lv) {
  let pool;
  if (lv >= 25) pool = taunts[25];
  else if (lv >= 20) pool = taunts[20];
  else if (lv >= 15) pool = taunts[15];
  else if (lv >= 11) pool = taunts[11];
  else if (lv >= 8) pool = taunts[8];
  else if (lv >= 5) pool = taunts[5];
  else pool = taunts[2];
  return pool[Math.floor(Math.random() * pool.length)];
}

// ---- Ranking ----
function getRank(lv) {
  if (lv >= 25) return { rank: 'SSS', cls: 'sss', pct: '前 0.01%' };
  if (lv >= 20) return { rank: 'SS', cls: 'ss', pct: '前 0.1%' };
  if (lv >= 15) return { rank: 'S', cls: 's', pct: '前 1%' };
  if (lv >= 11) return { rank: 'A', cls: 'a', pct: '前 5%' };
  if (lv >= 8) return { rank: 'B', cls: 'b', pct: '前 20%' };
  if (lv >= 5) return { rank: 'C', cls: 'c', pct: '前 50%' };
  if (lv >= 3) return { rank: 'D', cls: 'd', pct: '前 75%' };
  return { rank: 'F', cls: 'f', pct: '你可能需要去看醫生' };
}

// ---- Age comparison ----
function getAge(lv) {
  if (lv >= 25) return '愛因斯坦的大腦（已捐贈）';
  if (lv >= 20) return '記憶冠軍 25 歲';
  if (lv >= 15) return '巔峰期 22 歲';
  if (lv >= 11) return '大學生 20 歲';
  if (lv >= 8) return '上班族 30 歲';
  if (lv >= 5) return '中年人 45 歲';
  if (lv >= 3) return '65 歲長者';
  return '金魚 🐟（3 秒記憶）';
}

// ---- Milestones ----
const milestones = [5, 8, 11, 15, 20, 25, 31];
function getMilestoneProgress(lv) {
  let prev = 2, next = 5;
  for (const m of milestones) {
    if (lv < m) { next = m; break; }
    prev = m;
    next = milestones[milestones.indexOf(m) + 1] || m + 6;
  }
  return Math.min(100, ((lv - prev) / (next - prev)) * 100);
}

// ---- Game logic ----
function startGame() {
  level = 2;
  score = 0;
  sequence = [];
  showScreen('gameScreen');
  buildGrid();
  updateHUD();
  setTimeout(() => nextRound(), 600);
}

function updateHUD() {
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('taunt').textContent = getTaunt(level);
  document.getElementById('progressFill').style.width = getMilestoneProgress(level) + '%';
}

function nextRound() {
  playerIndex = 0;
  tapTimes = [];
  gameActive = false;
  showingSequence = true;
  document.getElementById('status').textContent = '觀察序列...';

  // Generate new sequence
  sequence = [];
  for (let i = 0; i < level; i++) {
    let next;
    do { next = Math.floor(Math.random() * 16); } while (sequence.length > 0 && next === sequence[sequence.length - 1]);
    sequence.push(next);
  }

  // Show sequence
  const tiles = document.querySelectorAll('.tile');
  let delay = 400;
  sequence.forEach((idx, i) => {
    setTimeout(() => {
      tiles[idx].classList.add('show');
      tiles[idx].classList.add('pulse');
    }, delay + i * 500);
    setTimeout(() => {
      tiles[idx].classList.remove('show');
      tiles[idx].classList.remove('pulse');
    }, delay + i * 500 + 300);
  });

  setTimeout(() => {
    showingSequence = false;
    gameActive = true;
    roundStartTime = performance.now();
    document.getElementById('status').textContent = `輪到你了！(0/${level})`;
  }, delay + sequence.length * 500 + 200);
}

function handleTap(idx) {
  if (!gameActive || showingSequence) return;

  const tiles = document.querySelectorAll('.tile');
  const tile = tiles[idx];

  if (idx === sequence[playerIndex]) {
    // Correct
    tapTimes.push(performance.now());
    tile.classList.add('correct', 'pulse');
    setTimeout(() => tile.classList.remove('correct', 'pulse'), 250);

    playerIndex++;
    document.getElementById('status').textContent = `正確！(${playerIndex}/${level})`;

    if (playerIndex === sequence.length) {
      // Round complete
      gameActive = false;
      const elapsed = performance.now() - roundStartTime;
      const avgTap = elapsed / level;
      const speedBonus = Math.max(0, Math.floor((2000 - avgTap) / 10));
      score += level * 10 + speedBonus;
      level++;
      updateHUD();
      document.getElementById('status').textContent = speedBonus > 0 ? `速度加分 +${speedBonus}！` : '完美！';
      setTimeout(() => nextRound(), 800);
    }
  } else {
    // Wrong
    gameActive = false;
    tile.classList.add('wrong', 'shake');
    // Show correct tile
    setTimeout(() => {
      tiles[sequence[playerIndex]].classList.add('show');
    }, 300);
    setTimeout(() => {
      tile.classList.remove('wrong', 'shake');
      tiles[sequence[playerIndex]].classList.remove('show');
      endGame();
    }, 1200);
  }
}

function endGame() {
  const finalLevel = level - 1; // last completed
  const isNewPB = finalLevel > personalBest;
  if (isNewPB) {
    personalBest = finalLevel;
    localStorage.setItem('ml-pb', personalBest);
  }

  const r = getRank(finalLevel);

  document.getElementById('resultRank').textContent = r.rank;
  document.getElementById('resultRank').className = 'result-rank ' + r.cls;
  document.getElementById('resultLevel').textContent = finalLevel;
  document.getElementById('resultMsg').textContent = getTaunt(finalLevel);
  document.getElementById('resultPercentile').textContent = r.pct;
  document.getElementById('resultAge').innerHTML = `你的記憶力相當於 <em>${getAge(finalLevel)}</em>`;

  const pbText = isNewPB ? `🏆 個人最佳: Level ${personalBest} (NEW!)` : `🏆 個人最佳: Level ${personalBest}`;
  document.getElementById('pbBadge').style.display = isNewPB ? 'block' : 'none';

  document.getElementById('resultDetail').innerHTML = `
    <strong>最終序列長度:</strong> ${finalLevel}<br>
    <strong>總分:</strong> ${score}<br>
    <strong>評級:</strong> ${r.rank} (${r.pct})<br>
    <strong>個人最佳:</strong> Level ${personalBest}
  `;

  // Restore name if saved
  const savedName = localStorage.getItem('ml-name') || '';
  document.getElementById('playerName').value = savedName;

  showScreen('resultScreen');

  // Track with GA
  if (typeof gtag === 'function') {
    gtag('event', 'game_over', { level: finalLevel, score: score, rank: r.rank });
  }
}

// ---- Score submission ----
function submitScore() {
  const name = document.getElementById('playerName').value.trim() || '匿名玩家';
  localStorage.setItem('ml-name', name);
  const finalLevel = parseInt(document.getElementById('resultLevel').textContent);
  scoresRef.push({
    name: name,
    level: finalLevel,
    score: score,
    rank: getRank(finalLevel).rank,
    ts: Date.now()
  }).then(() => {
    document.getElementById('nameInput').innerHTML = '<div style="color:#00ff88;font-size:.85rem">✅ 已上傳排行榜！</div>';
  }).catch(() => {
    document.getElementById('nameInput').innerHTML = '<div style="color:#ff2d55;font-size:.85rem">上傳失敗，請重試</div>';
  });
}

// ---- Leaderboard ----
function showLeaderboard() {
  document.getElementById('lbModal').classList.add('active');
  document.getElementById('lbList').innerHTML = '<div style="text-align:center;color:#888;padding:20px">載入中...</div>';
  scoresRef.orderByChild('level').limitToLast(20).once('value').then(snap => {
    const entries = [];
    snap.forEach(c => entries.push(c.val()));
    entries.sort((a, b) => b.level - a.level || b.score - a.score);
    if (entries.length === 0) {
      document.getElementById('lbList').innerHTML = '<div style="text-align:center;color:#888;padding:20px">還沒有紀錄</div>';
      return;
    }
    document.getElementById('lbList').innerHTML = entries.map((e, i) => `
      <div class="lb-row">
        <span class="lb-rank">${i + 1}</span>
        <span class="lb-name">${escHTML(e.name)}</span>
        <span class="lb-score">Lv.${e.level} (${e.rank})</span>
      </div>
    `).join('');
  }).catch(() => {
    document.getElementById('lbList').innerHTML = '<div style="text-align:center;color:#888;padding:20px">載入失敗</div>';
  });
}
function closeLB() { document.getElementById('lbModal').classList.remove('active'); }
function escHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

}

function shareCopy() {

    const btn = event.target;
    btn.textContent = '✅ 已複製';
    setTimeout(() => btn.textContent = '📋 複製', 2000);
  });
}

function generateShareImage() {
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Decorative grid
  ctx.strokeStyle = '#1e1e32';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    for (let j = 0; j < 5; j++) {
      const x = 140 + i * 160, y = 500 + j * 80;
      ctx.strokeRect(x, y, 140, 60);
    }
  }

  // Title
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 64px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🧠 記憶極限', W / 2, 140);

  ctx.fillStyle = '#666';
  ctx.font = '32px -apple-system, sans-serif';
  ctx.fillText('Memory Limit Challenge', W / 2, 200);

  // Level
  const lv = document.getElementById('resultLevel').textContent;
  const r = getRank(parseInt(lv));

  ctx.fillStyle = '#e0e0e0';
  ctx.font = 'bold 48px -apple-system, sans-serif';
  ctx.fillText('我的記憶力', W / 2, 340);

  // Rank
  const rankColors = { sss: '#ffd700', ss: '#ff6b6b', s: '#ffd700', a: '#a855f7', b: '#6366f1', c: '#3b82f6', d: '#888', f: '#ff2d55' };
  ctx.fillStyle = rankColors[r.cls] || '#a855f7';
  ctx.font = 'bold 180px -apple-system, sans-serif';
  ctx.fillText(r.rank, W / 2, 560);

  ctx.fillStyle = '#e0e0e0';
  ctx.font = 'bold 60px -apple-system, sans-serif';
  ctx.fillText(`Level ${lv}`, W / 2, 650);

  ctx.fillStyle = '#888';
  ctx.font = '36px -apple-system, sans-serif';
  ctx.fillText(r.pct, W / 2, 720);

  // Age
  ctx.fillStyle = '#aaa';
  ctx.font = '30px -apple-system, sans-serif';
  ctx.fillText(`記憶力相當於 ${getAge(parseInt(lv))}`, W / 2, 800);

  // CTA
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 34px -apple-system, sans-serif';
  ctx.fillText('你的記憶力能撐到第幾關？', W / 2, 920);

  ctx.fillStyle = '#666';
  ctx.font = '26px -apple-system, sans-serif';
  ctx.fillText('yuchenchen-debug.github.io/memory-limit', W / 2, 980);

  return canvas;
}

function shareIG() {
  const canvas = generateShareImage();
  canvas.toBlob(blob => {
    if (navigator.share) {
      const file = new File([blob], 'memory-limit.png', { type: 'image/png' });
      navigator.share({ files: [file] }).catch(() => {});
    } else {
      shareDL();
    }
  });
}

function shareDL() {
  const canvas = generateShareImage();
  const link = document.createElement('a');
  link.download = 'memory-limit-result.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
